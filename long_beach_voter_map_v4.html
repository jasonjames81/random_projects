    }

    function getColor(d) {
        return d > 60 ? '#084594' :
               d > 40 ? '#2171b5' :
               d > 20 ? '#4292c6' :
               d > 0  ? '#6baed6' :
               d > -20 ? '#fcae91' :
               d > -40 ? '#fb6a4a' :
               d > -60 ? '#de2d26' :
                        '#a50f15';
    }

    function style(feature) {
        var stats = feature.properties.party_stats;
        if (!stats) {
            return { fillColor: 'transparent', weight: 1, opacity: 0.3, color: '#999', fillOpacity: 0 };
        }
        var dem_pct = stats.dem.pct;
        var rep_pct = stats.rep.pct;
        var margin = dem_pct - rep_pct;
        return { fillColor: getColor(margin), weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7 };
    }

    function onEachFeature(feature, layer) {
        var props = feature.properties;
        var stats = props.party_stats;
        var tract = props.TRACTCE;
        var formattedTract = tract.slice(0, 4) + "." + tract.slice(4);
        
        var popupContent = "<div class='popup-header'>" +
            "<h3>Tract " + formattedTract + ", Block Group " + props.BLKGRPCE + "</h3>" +
            "<div>GEOID: " + props.GEOID + "</div>" +
            "</div>";
        
        popupContent += "<b>Total Registered:</b> " + props.total_reg_full.toLocaleString() + "<br/>";
        
        if (stats) {
            popupContent += "<i>Breakdown based on " + props.active_total.toLocaleString() + " active voters</i><br/>";
            popupContent += "<table class='popup-table'>" +
                "<tr><th>Code</th><th>Party</th><th>Count</th><th>%</th></tr>";
            
            var sortedParties = Object.values(stats).sort((a, b) => b.count - a.count);
            sortedParties.forEach(p => {
                popupContent += "<tr><td>" + p.code + "</td><td>" + p.label + "</td><td>" + p.count.toLocaleString() + "</td><td>" + p.pct + "%</td></tr>";
            });
            popupContent += "</table>";
        } else {
            popupContent += "<i>No party registration details available for this block group.</i>";
        }

        layer.bindPopup(popupContent, { maxWidth: 350 });
        layer.on({
            mouseover: function(e) {
                if (props.party_stats) {
                    var layer = e.target;
                    layer.setStyle({ weight: 3, color: '#666', fillOpacity: 0.9 });
                    layer.bringToFront();
                }
            },
            mouseout: function(e) { geojson.resetStyle(e.target); }
        });
    }

    var geojson = L.geoJson(geojsonData, { style: style, onEachFeature: onEachFeature }).addTo(map);

    // Democratic Margin Legend (Bottom Right)
    var marginLegend = L.control({position: 'bottomright'});
    marginLegend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'info legend'),
            grades = [-100, -60, -40, -20, 0, 20, 40, 60];
        div.innerHTML += '<h4>Dem Margin (%)</h4>';
        for (var i = 0; i < grades.length; i++) {
            div.innerHTML += '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
        }
        return div;
    };
    marginLegend.addTo(map);

    // Party Key Legend (Bottom Left)
    var partyKey = L.control({position: 'bottomleft'});
    partyKey.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'info party-key');
        var parties = {"dem": "Democratic", "rep": "Republican", "aip": "American Independent", "paf": "Peace and Freedom", "msc": "Miscellaneous", "lib": "Libertarian", "nlp": "Natural Law", "grn": "Green", "ref": "Reform", "dcl": "No Party Preference"};
        var html = '<h4>Party Key</h4><ul>';
        Object.keys(parties).sort().forEach(function(code) {
            html += '<li><b>' + code.toUpperCase() + '</b> ' + parties[code] + '</li>';
        });
        html += '</ul>';
        div.innerHTML = html;
        return div;
    };
    partyKey.addTo(map);

    // Long Beach Overall Totals (Top Right)
    var overallStats = L.control({position: 'topright'});
    overallStats.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'info overall-stats');
        var html = '<h4>Long Beach Overall (G24)</h4>';
        html += '<b>Total Registered: </b>' + lbTotalCount.toLocaleString() + '<br/>';
        html += '<i>(Breakdown based on active voters)</i><br/><br/>';
        html += '<table><tr><th>Party</th><th>Count</th><th>%</th></tr>';
        lbOverall.forEach(function(p) {
            html += '<tr><td>' + p.label + '</td><td>' + p.count.toLocaleString() + '</td><td>' + p.pct + '%</td></tr>';
        });
        html += '</table>';
        div.innerHTML = html;
        return div;
    };
    overallStats.addTo(map);

</script>
</body>
</html>
