            box-shadow: 0 1px 5px rgba(0,0,0,0.4);

        .popup-header { margin-bottom: 8px; }

        return d > 60 ? '#084594' :

    function style(feature) {
        var stats = feature.properties.party_stats;
        if (!stats) {

        }
        var dem_pct = stats.dem.pct;
        var rep_pct = stats.rep.pct;

        return { fillColor: getColor(margin), weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7 };

        html += '<table><tr><th>Party</th><th>Count</th><th>%</th></tr>';

            html += '<tr><td>' + p.label + '</td><td>' + p.count.toLocaleString() + '</td><td>' + p.pct + '%</td></tr>';
        });
        html += '</table>';
        div.innerHTML = html;
        return div;
    };
    overallStats.addTo(map);

</script>
